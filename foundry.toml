[profile.default]
src    = "src"
out    = "out"
libs   = ["lib"]
test   = "test"
script = "script"

solc           = "0.8.20"
optimizer      = true
optimizer_runs = 200

[profile.default.fuzz]
runs = 512
seed = "0xdeadbeef"

[profile.default.invariant]
runs  = 64
depth = 15

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
